{% extends "base.html" %}
{% block content %}
<div class="container mt-5 text-center">
    <h3>Google Authenticator Verification</h3>
    <p>Scan the QR code below in your Google Authenticator app if not already added.</p>
    
    <img src="data:image/png;base64,{{ qr_code }}" alt="QR Code" class="mb-4" style="max-width: 200px;">

    <form method="POST" action="{{ url_for('admin.admin_authenticator_post') }}" class="d-inline-block" style="max-width: 300px; margin: auto;">
        <div class="form-group mb-3">
            <label>Enter the 6-digit code</label>
            <input type="text" name="code" class="form-control text-center" placeholder="123456" maxlength="6" required>
        </div>
        <button type="submit" class="btn btn-primary">Verify Code</button>
    </form>
</div>
{% endblock %}
